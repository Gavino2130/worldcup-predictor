<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FIFA World Cup 2026 Predictor — Cloud Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  ⚠️ SETUP REQUIRED
  Open this file in a text editor, find the CONFIG block in the <script> below,
  and paste your Supabase project URL and anon (public) key. Both are visible in
  your Supabase dashboard → Settings → API. The anon key is safe to share — RLS
  protects your data. Save the file, then host it or share with friends.
-->
<style>
  :root {
    --bg: #0a0e1a;
    --bg-2: #131829;
    --card: #1a2138;
    --card-hover: #222b48;
    --border: #2a3454;
    --text: #e8ecf5;
    --text-dim: #8b95b0;
    --accent: #ff2d6f;
    --accent-2: #00ff9d;
    --accent-3: #ffd60a;
    --locked: #4a5478;
    --danger: #ff4757;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Manrope', sans-serif;
    min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(circle at 15% 10%, rgba(255,45,111,0.12), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(0,255,157,0.08), transparent 40%);
    pointer-events: none; z-index: 0;
  }
  #root { position: relative; z-index: 1; }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,26,0.85);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 1280px; margin: 0 auto;
    padding: 18px 32px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
  }
  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 2px;
    display: flex; align-items: center; gap: 12px;
  }
  .brand-accent { color: var(--accent); text-shadow: 0 0 20px rgba(255,45,111,0.4); }
  .brand-dot { color: var(--accent-2); }
  nav { display: flex; gap: 4px; }
  .nav-btn {
    background: transparent; border: 1px solid transparent;
    color: var(--text-dim); padding: 10px 18px;
    font-family: 'Manrope', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase; cursor: pointer;
    border-radius: 8px; transition: all 0.2s;
  }
  .nav-btn:hover { color: var(--text); background: var(--card); }
  .nav-btn.active {
    color: var(--bg); background: var(--accent-2);
    border-color: var(--accent-2);
  }
  .user-pill {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); padding: 8px 14px;
    border-radius: 100px; border: 1px solid var(--border);
    font-size: 13px;
  }
  .user-pill .logout-btn {
    background: transparent; border: none; color: var(--text-dim);
    cursor: pointer; font-family: inherit; font-size: 12px;
    padding: 2px 8px; border-radius: 4px;
  }
  .user-pill .logout-btn:hover { color: var(--accent); background: rgba(255,45,111,0.1); }

  main { max-width: 1280px; margin: 0 auto; padding: 40px 32px 80px; }
  .page-header { margin-bottom: 32px; }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 7vw, 80px);
    line-height: 0.95; letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .page-title .gradient {
    background: linear-gradient(90deg, var(--accent), var(--accent-3));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .page-subtitle {
    color: var(--text-dim); font-size: 16px;
    max-width: 600px; line-height: 1.6;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ===== AUTH / JOIN / CONFIG SCREENS ===== */
  .gateway {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 20px;
  }
  .gateway-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px;
    width: 100%; max-width: 460px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
  }
  .gateway-poster {
    width: 100px; margin: 0 auto 24px;
    border-radius: 8px; overflow: hidden;
    box-shadow: 0 10px 30px rgba(255,45,111,0.3);
    display: block;
  }
  .gateway-poster img { width: 100%; display: block; }
  .gateway-card h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; letter-spacing: 1px;
    text-align: center; margin-bottom: 8px;
  }
  .gateway-card h1 .gradient {
    background: linear-gradient(90deg, var(--accent), var(--accent-3));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .gateway-card .subtitle {
    color: var(--text-dim); text-align: center;
    font-size: 14px; margin-bottom: 28px; line-height: 1.5;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 6px;
  }
  .field input, .field textarea {
    width: 100%; background: var(--bg-2);
    border: 2px solid var(--border); border-radius: 10px;
    color: var(--text); padding: 12px 14px;
    font-family: inherit; font-size: 15px;
    transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .field textarea { font-family: 'JetBrains Mono', monospace; font-size: 12px; min-height: 80px; }
  .full-btn {
    width: 100%; background: var(--accent-2); color: var(--bg);
    border: none; padding: 14px 20px;
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 14px;
    letter-spacing: 1px; text-transform: uppercase;
    border-radius: 10px; cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
  }
  .full-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(0,255,157,0.3);
  }
  .full-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .full-btn.secondary {
    background: var(--card); color: var(--text);
    border: 1px solid var(--border);
  }
  .toggle-link {
    background: none; border: none;
    color: var(--accent-2); cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 600;
    text-decoration: underline; text-underline-offset: 3px;
    padding: 4px 8px;
  }
  .gateway-footer {
    text-align: center; margin-top: 20px;
    color: var(--text-dim); font-size: 13px;
  }
  .error-msg {
    background: rgba(255,71,87,0.1);
    border: 1px solid rgba(255,71,87,0.3);
    color: #ff8a95;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px; line-height: 1.5;
    margin-bottom: 16px;
  }
  .info-msg {
    background: rgba(0,255,157,0.08);
    border: 1px solid rgba(0,255,157,0.25);
    color: var(--accent-2);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px; line-height: 1.5;
    margin-bottom: 16px;
  }

  /* ===== MIGRATION BANNER ===== */
  .migration-banner {
    background: linear-gradient(90deg, rgba(255,214,10,0.12), rgba(255,45,111,0.08));
    border: 1px solid rgba(255,214,10,0.3);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 20px; flex-wrap: wrap;
  }
  .migration-banner h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 1px;
    color: var(--accent-3); margin-bottom: 4px;
  }
  .migration-banner p {
    font-size: 13px; color: var(--text-dim); line-height: 1.5;
  }
  .migration-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }

  /* ===== TOAST ===== */
  .toast-stack {
    position: fixed; top: 80px; right: 20px;
    display: flex; flex-direction: column; gap: 10px;
    z-index: 1000; pointer-events: none;
  }
  .toast {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px;
    font-size: 14px; max-width: 360px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: toast-in 0.2s ease-out;
    pointer-events: auto;
  }
  .toast.error { border-color: var(--danger); color: #ff8a95; }
  .toast.success { border-color: var(--accent-2); color: var(--accent-2); }
  @keyframes toast-in {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* HOME HERO */
  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr);
    gap: 48px; align-items: center;
    margin-bottom: 56px; min-height: 60vh;
  }
  .hero-poster {
    position: relative; border-radius: 20px; overflow: hidden;
    box-shadow: 0 30px 60px rgba(255,45,111,0.25), 0 10px 30px rgba(0,0,0,0.5);
    transform: rotate(-2deg); transition: transform 0.4s;
  }
  .hero-poster:hover { transform: rotate(0deg) scale(1.02); }
  .hero-poster img { width: 100%; display: block; }
  .hero-poster::after {
    content: ''; position: absolute; inset: 0;
    border: 3px solid var(--accent-2);
    border-radius: 20px; transform: translate(8px, 8px); z-index: -1;
  }
  .hero-content h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 8vw, 96px);
    line-height: 0.9; letter-spacing: 1px; margin-bottom: 16px;
  }
  .hero-content h1 .line2 {
    display: block;
    background: linear-gradient(90deg, var(--accent), var(--accent-3));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero-intro { color: var(--text-dim); font-size: 17px; line-height: 1.7; margin-bottom: 28px; max-width: 520px; }
  .countdown { display: flex; gap: 12px; margin-bottom: 32px; }
  .countdown-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    min-width: 70px; text-align: center;
  }
  .countdown-num { font-family: 'Bebas Neue', sans-serif; font-size: 40px; line-height: 1; color: var(--accent-2); }
  .countdown-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-top: 4px; }
  .cta-btn {
    background: var(--accent-2); color: var(--bg);
    border: none; padding: 16px 32px;
    font-family: 'Manrope', sans-serif;
    font-weight: 800; font-size: 15px;
    letter-spacing: 1px; text-transform: uppercase;
    border-radius: 12px; cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 8px 24px rgba(0,255,157,0.3);
  }
  .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,255,157,0.5); }
  .home-bonus-section { margin-top: 24px; padding-top: 40px; border-top: 1px dashed var(--border); }
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent-2); margin-bottom: 12px;
  }
  .league-info-pill {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(0,255,157,0.08);
    border: 1px solid rgba(0,255,157,0.25);
    border-radius: 100px; padding: 6px 14px;
    font-size: 13px; color: var(--accent-2);
    margin-bottom: 20px;
  }
  .league-info-pill .code {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    background: var(--bg-2); padding: 2px 8px; border-radius: 4px;
    color: var(--text);
  }

  /* STAGE TABS */
  .stage-tabs {
    display: flex; gap: 4px; margin: 32px 0 24px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border); padding-bottom: 4px;
  }
  .stage-tab {
    background: transparent; border: none;
    color: var(--text-dim); padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -5px;
    transition: all 0.2s;
  }
  .stage-tab:hover { color: var(--text); }
  .stage-tab.active { color: var(--accent-2); border-bottom-color: var(--accent-2); }
  .stage-tab .count {
    background: var(--card); color: var(--text-dim);
    padding: 2px 7px; border-radius: 100px;
    font-size: 10px; margin-left: 6px;
  }

  /* MATCH CARDS */
  .matches-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }
  .match-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
    transition: all 0.2s; position: relative;
  }
  .match-card:hover { border-color: var(--accent-2); transform: translateY(-2px); }
  .match-card.locked { opacity: 0.85; }
  .match-card.scored { border-color: rgba(0,255,157,0.3); }

  .match-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 1px;
    color: var(--text-dim); text-transform: uppercase;
  }
  .match-id { color: var(--accent-3); font-weight: 700; }
  .match-stage-pill {
    padding: 3px 9px; border-radius: 4px;
    background: var(--bg-2); border: 1px solid var(--border);
    font-size: 10px;
  }
  .match-teams {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 12px; align-items: center; margin-bottom: 16px;
  }
  .team { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .team.team-away { flex-direction: row-reverse; }
  .flag-img {
    width: 36px; height: 26px; object-fit: cover;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0; background: var(--bg-2);
  }
  .team-name { font-weight: 700; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .vs { font-family: 'Bebas Neue', sans-serif; color: var(--text-dim); font-size: 18px; letter-spacing: 1px; }

  .score-inputs {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 12px; align-items: center; margin-bottom: 14px;
  }
  .score-input {
    background: var(--bg-2); border: 2px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; text-align: center;
    padding: 12px; width: 100%; transition: all 0.15s;
  }
  .score-input:focus { outline: none; border-color: var(--accent); background: rgba(255,45,111,0.05); }
  .score-input:disabled { color: var(--locked); cursor: not-allowed; }
  .score-dash { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--text-dim); }

  .first-scorer {
    margin-top: 4px; margin-bottom: 14px;
    padding: 12px;
    background: rgba(255,45,111,0.06);
    border: 1px dashed rgba(255,45,111,0.3);
    border-radius: 10px;
  }
  .first-scorer-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 6px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .first-scorer-label .reward { color: var(--accent-3); font-weight: 700; }
  .first-scorer select {
    width: 100%; background: var(--bg-2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 12px;
    font-family: inherit; font-size: 14px; cursor: pointer;
  }
  .first-scorer select:focus { outline: none; border-color: var(--accent); }
  .first-scorer select:disabled { cursor: not-allowed; color: var(--locked); }
  .first-scorer select optgroup { font-style: normal; font-weight: 700; color: var(--accent-2); }

  .match-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 12px; border-top: 1px dashed var(--border);
    font-size: 12px;
  }
  .lock-status { display: flex; align-items: center; gap: 6px; color: var(--text-dim); }
  .lock-status.locked { color: var(--accent); }
  .points-earned { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--accent-2); font-size: 13px; }
  .actual-result { font-family: 'JetBrains Mono', monospace; color: var(--accent-3); font-weight: 600; font-size: 11px; }

  /* OPPONENTS BLOCK (predictions after lock) */
  .opponents {
    margin-top: 14px; padding-top: 12px;
    border-top: 1px dashed var(--border);
  }
  .opponents-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 8px;
  }
  .opponents-list { display: flex; flex-direction: column; gap: 4px; }
  .opponent-row {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text-dim);
    padding: 2px 0;
  }
  .opponent-row .score {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
  }

  /* LEADERBOARD */
  .leaderboard-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .leaderboard-row {
    display: grid; grid-template-columns: 60px 1fr auto auto;
    gap: 16px; align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .leaderboard-row:last-child { border-bottom: none; }
  .leaderboard-row:hover { background: var(--card-hover); }
  .leaderboard-row.me {
    background: linear-gradient(90deg, rgba(255,45,111,0.08), transparent);
    border-left: 3px solid var(--accent);
  }
  .leaderboard-row.header {
    background: var(--bg-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-dim); font-weight: 700;
  }
  .rank { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--text-dim); }
  .rank.gold { color: var(--accent-3); }
  .rank.silver { color: #c0c8d8; }
  .rank.bronze { color: #cd7f32; }
  .player-name { font-weight: 700; font-size: 16px; }
  .player-stat { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim); }
  .total-points { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent-2); min-width: 60px; text-align: right; }

  /* BONUS CARDS */
  .bonus-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
  .bonus-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .bonus-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; margin-bottom: 4px; }
  .bonus-card .pts {
    display: inline-block; background: var(--accent); color: white;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px; margin-bottom: 16px;
  }
  .bonus-card p { color: var(--text-dim); font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
  .bonus-card select, .bonus-card input {
    width: 100%; background: var(--bg-2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 12px;
    font-family: inherit; font-size: 14px;
  }
  .bonus-card select:focus, .bonus-card input:focus { outline: none; border-color: var(--accent-2); }

  /* RULES */
  .rules-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 24px; }
  .rules-card h2 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; margin-bottom: 20px; color: var(--accent-2); }
  .scoring-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  .scoring-table th, .scoring-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
  .scoring-table th { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }
  .scoring-table td.points { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--accent-2); text-align: center; }

  /* STATS */
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; line-height: 1; }
  .stat.primary .stat-value { color: var(--accent-2); }
  .stat.warn .stat-value { color: var(--accent-3); }

  /* ADMIN */
  .admin-note {
    background: rgba(255,214,10,0.08);
    border: 1px solid rgba(255,214,10,0.3);
    border-radius: 12px; padding: 16px 20px;
    margin-bottom: 24px; font-size: 13px; color: var(--accent-3);
  }
  .btn {
    background: var(--accent-2); color: var(--bg); border: none;
    padding: 10px 18px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
    text-transform: uppercase; border-radius: 8px; cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,255,157,0.3); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn.danger { background: var(--accent); color: white; }
  .btn.small { padding: 6px 12px; font-size: 12px; }

  /* LOADING */
  .loading-fullscreen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; gap: 32px; }
    .hero-poster { max-width: 360px; margin: 0 auto; }
  }
  @media (max-width: 640px) {
    .header-inner { padding: 14px 20px; }
    main { padding: 24px 16px 60px; }
    .matches-grid { grid-template-columns: 1fr; }
    .leaderboard-row { grid-template-columns: 40px 1fr auto; padding: 12px 16px; gap: 10px; }
    .leaderboard-row .hide-mobile { display: none; }
  }
</style>

let supabase = null;

  && SUPABASE_URL.startsWith('https://') && SUPABASE_ANON_KEY.length > 40;

  supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================================
// CONSTANTS & HELPERS
// ============================================================================
const STAGES = [
  { key: 'GROUP', label: 'Group Stage' },
  { key: 'R32',   label: 'Round of 32' },
  { key: 'R16',   label: 'Round of 16' },
  { key: 'QF',    label: 'Quarter-Finals' },
  { key: 'SF',    label: 'Semi-Finals' },
  { key: '3PL',   label: '3rd Place' },
  { key: 'F',     label: 'Final' },
];

function flagUrl(iso) { return `https://flagcdn.com/${iso}.svg`; }

function formatKickoff(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-CA', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit',
    timeZone: 'America/Vancouver'
  });
}

function isLocked(match) {
  const kickoff = new Date(match.kickoff_at).getTime();
  return Date.now() >= kickoff - 15 * 60 * 1000;
}

function stageLabel(stage) {
  return STAGES.find(s => s.key === stage)?.label || stage;
}

function FlagImg({ iso, alt }) {
  if (!iso) return h('span', { className: 'flag-img', style: {
    display:'inline-flex', alignItems:'center', justifyContent:'center',
    fontSize:'14px', color:'var(--text-dim)'
  }}, '?');
  return h('img', { className: 'flag-img', src: flagUrl(iso), alt: alt || '', loading: 'lazy' });
}

// ============================================================================
// TOAST SYSTEM
// ============================================================================
const ToastContext = React.createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const idRef = useRef(0);

  const push = useCallback((message, kind = 'info') => {
    const id = ++idRef.current;
    setToasts(t => [...t, { id, message, kind }]);
    setTimeout(() => {
      setToasts(t => t.filter(x => x.id !== id));
    }, 4000);
  }, []);

  return h(ToastContext.Provider, { value: push },
    children,
    h('div', { className: 'toast-stack' },
      toasts.map(t => h('div', { key: t.id, className: `toast ${t.kind}` }, t.message))
    )
  );
}
function useToast() { return React.useContext(ToastContext); }

// ============================================================================
// HOOKS — Auth
// ============================================================================
function useAuth() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let mounted = true;
    supabase.auth.getSession().then(({ data }) => {
      if (mounted) {
        setUser(data.session?.user || null);
        setLoading(false);
      }
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      if (mounted) setUser(session?.user || null);
    });
    return () => { mounted = false; subscription.unsubscribe(); };
  }, []);

  useEffect(() => {
    if (!user) { setProfile(null); return; }
    supabase.from('profiles').select('*').eq('id', user.id).single()
      .then(({ data }) => setProfile(data));
  }, [user]);

  return { user, profile, loading };
}

// ============================================================================
// HOOKS — Reference data (teams, players)
// ============================================================================
function useReferenceData() {
  const [teams, setTeams] = useState([]);
  const [players, setPlayers] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([
      supabase.from('teams').select('*').order('group').order('name'),
      supabase.from('players').select('*').eq('active', true).order('name'),
    ]).then(([tRes, pRes]) => {
      setTeams(tRes.data || []);
      setPlayers(pRes.data || []);
      setLoading(false);
    });
  }, []);

  // Index by code for lookup
  const teamByCode = useMemo(() => {
    const m = {};
    teams.forEach(t => { m[t.code] = t; });
    return m;
  }, [teams]);

  const playersByTeam = useMemo(() => {
    const m = {};
    players.forEach(p => {
      if (!m[p.team_code]) m[p.team_code] = [];
      m[p.team_code].push(p);
    });
    return m;
  }, [players]);

  const playerById = useMemo(() => {
    const m = {};
    players.forEach(p => { m[p.id] = p; });
    return m;
  }, [players]);

  return { teams, players, teamByCode, playersByTeam, playerById, loading };
}

// HOOKS — Matches (with realtime)

function useMatches() {
  const [matches, setMatches] = useState([]);

// ============================================================================
// HOOKS — User's own predictions + bonus picks
// ============================================================================
function useMyPredictions(userId) {
  const [predictions, setPredictions] = useState({});  // keyed by match_id
  const [loading, setLoading] = useState(true);

  const refetch = useCallback(async () => {
    if (!userId) return;
    const { data } = await supabase
      .from('predictions')
      .select('*')
      .eq('user_id', userId);
    const m = {};
    (data || []).forEach(p => { m[p.match_id] = p; });
    setPredictions(m);
    setLoading(false);
  }, [userId]);

  useEffect(() => { refetch(); }, [refetch]);

  const upsert = useCallback(async (matchId, fields) => {
    if (!userId) return;
    const current = predictions[matchId] || {};
    const merged = {
      user_id: userId, match_id: matchId,
      home_score: current.home_score ?? null,
      away_score: current.away_score ?? null,
      first_scorer_id: current.first_scorer_id ?? null,
      no_goal_prediction: current.no_goal_prediction ?? false,
      ...fields,
    };
    // Must have both scores to save; null + null is OK for clearing
    if (merged.home_score == null || merged.away_score == null) {
      // Optimistic local merge for partial input
      setPredictions(p => ({ ...p, [matchId]: { ...current, ...fields } }));
      return { partial: true };
    }
    const { data, error } = await supabase
      .from('predictions')
      .upsert(merged, { onConflict: 'user_id,match_id' })
      .select()
      .single();
    if (error) return { error };
    setPredictions(p => ({ ...p, [matchId]: data }));
    return { data };
  }, [userId, predictions]);

  return { predictions, loading, upsert, refetch };
}

function useMyBonusPicks(userId) {
  const [bonus, setBonus] = useState({});
  const [loading, setLoading] = useState(true);

  const refetch = useCallback(async () => {
    if (!userId) return;
    const { data } = await supabase
      .from('bonus_picks').select('*').eq('user_id', userId).maybeSingle();
    setBonus(data || {});
    setLoading(false);
  }, [userId]);

  useEffect(() => { refetch(); }, [refetch]);

  const upsert = useCallback(async (fields) => {
    if (!userId) return;
    const merged = { user_id: userId, ...bonus, ...fields };
    const { data, error } = await supabase
      .from('bonus_picks')
      .upsert(merged, { onConflict: 'user_id' })
      .select().single();
    if (error) return { error };
    setBonus(data);
    return { data };
  }, [userId, bonus]);

  return { bonus, loading, upsert };
}

// ============================================================================
// HOOKS — Leaderboard (realtime via underlying tables)
// ============================================================================
function useLeaderboard(leagueId) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);

  const refetch = useCallback(async () => {
    if (!leagueId) return;
    const { data } = await supabase
      .from('leaderboard')
      .select('*')
      .eq('league_id', leagueId)
      .order('total_points', { ascending: false });
    setRows(data || []);
    setLoading(false);
  }, [leagueId]);

  useEffect(() => { refetch(); }, [refetch]);

  // Re-fetch when underlying tables change
  useEffect(() => {
    if (!leagueId) return;
    const ch = supabase.channel(`lb-${leagueId}`)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'predictions' }, refetch)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'matches' }, refetch)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'bonus_picks' }, refetch)
      .subscribe();
    return () => { supabase.removeChannel(ch); };
  }, [leagueId, refetch]);

  return { rows, loading, refetch };
}

          email, password,
          options: { data: { display_name: displayName.trim() } }

        if (data.user && !data.session) {

        h('input', { type: 'text', value: displayName, onChange: e => setDisplayName(e.target.value), placeholder: 'How you appear on the leaderboard' })

// ============================================================================
// COMPONENT — Migration banner (one-time localStorage → Supabase)
// ============================================================================
function MigrationBanner({ userId, matches, playersByTeam, onComplete }) {
  const toast = useToast();
  const [dismissed, setDismissed] = useState(false);

  // Check for prototype data in localStorage
  const oldData = useMemo(() => {
    try {
      const raw = localStorage.getItem('wcp_v2');
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      const counts = {};
      Object.entries(parsed.predictions || {}).forEach(([user, preds]) => {
        const valid = Object.entries(preds).filter(([_, p]) => p && p.home != null && p.away != null);
        if (valid.length > 0) counts[user] = valid.length;
      });
      return Object.keys(counts).length > 0 ? { ...parsed, counts } : null;
    } catch (e) { return null; }
  }, []);

  if (!oldData || dismissed) return null;

  const migrate = async (mockUserName) => {
    const userPreds = oldData.predictions[mockUserName] || {};
    const validPreds = Object.entries(userPreds).filter(([_, p]) => p && p.home != null && p.away != null);
    const rows = validPreds.map(([matchId, p]) => {
      // Old prototype stored firstScorer as a plain string player name; we look it up.
      let first_scorer_id = null;
      let no_goal_prediction = false;
      if (p.firstScorer) {
        if (p.firstScorer === 'No goal scored / Own goal') {
          no_goal_prediction = true;
        } else {
          // Search across all teams for matching player name
          const match = matches.find(m => m.id === matchId);
          if (match && match.home_team_code && match.away_team_code) {
            const candidates = [
              ...(playersByTeam[match.home_team_code] || []),
              ...(playersByTeam[match.away_team_code] || []),
            ];
            const found = candidates.find(pl => pl.name === p.firstScorer);
            if (found) first_scorer_id = found.id;
          }
        }
      }
      return {
        user_id: userId,
        match_id: matchId,
        home_score: p.home,
        away_score: p.away,
        first_scorer_id, no_goal_prediction
      };
    }).filter(r => matches.some(m => m.id === r.match_id)); // skip predictions for unknown matches

    const { error } = await supabase
      .from('predictions')
      .upsert(rows, { onConflict: 'user_id,match_id' });
    if (error) {
      toast(`Migration failed: ${error.message}`, 'error');
      return;
    }
    toast(`Migrated ${rows.length} predictions from "${mockUserName}"`, 'success');
    // Bonus picks too
    const oldBonus = oldData.bonusPicks?.[mockUserName] || {};
    if (oldBonus.winner || oldBonus.topScorer) {
      await supabase.from('bonus_picks').upsert({
        user_id: userId,
        winner_team_code: oldBonus.winner || null,
        // Note: prototype stored Golden Boot as free text — we leave it null and prompt user to re-pick
      }, { onConflict: 'user_id' });
    }
    localStorage.removeItem('wcp_v2');
    setDismissed(true);
    onComplete();
  };

  const skipAndClear = () => {
    if (confirm('Discard all prototype data?')) {
      localStorage.removeItem('wcp_v2');
      setDismissed(true);
    }
  };

  const users = Object.keys(oldData.counts);

  return h('div', { className: 'migration-banner' },
    h('div', { style: { flex: '1', minWidth: '240px' } },
      h('h3', null, '📦 Prototype data found'),
      h('p', null, `Found predictions from the local prototype across ${users.length} mock users. Pick which mock user's picks to import as yours, or discard the data.`)
    ),
    h('div', { className: 'migration-actions' },
      users.map(u =>
        h('button', { key: u, className: 'btn small', onClick: () => migrate(u) },
          `Import "${u}" (${oldData.counts[u]})`)
      ),
      h('button', { className: 'btn small secondary', onClick: () => setDismissed(true) }, 'Later'),
      h('button', { className: 'btn small danger', onClick: skipAndClear }, 'Discard')
    )
  );
}

// ============================================================================
// MAIN APP — once authenticated AND in a league
// ============================================================================
function MainApp({ user, profile, league, onLeftLeague }) {
  const toast = useToast();
  const [page, setPage] = useState('home');
  const [activeStage, setActiveStage] = useState('GROUP');

  const { teams, teamByCode, playersByTeam, playerById, loading: refLoading } = useReferenceData();
  const { matches, loading: matchesLoading, refetch: refetchMatches } = useMatches();
  const { predictions, upsert: upsertPrediction } = useMyPredictions(user.id);
  const { bonus, upsert: upsertBonus } = useMyBonusPicks(user.id);
  const { rows: leaderboard } = useLeaderboard(league.id);

  // Local prediction draft state (so partial input doesn't cause failed upserts)
  const [drafts, setDrafts] = useState({});
  const draftFor = (matchId) => {
    const p = predictions[matchId] || {};
    const d = drafts[matchId] || {};
    return {
      home_score: d.home_score !== undefined ? d.home_score : p.home_score,
      away_score: d.away_score !== undefined ? d.away_score : p.away_score,
      first_scorer_id: d.first_scorer_id !== undefined ? d.first_scorer_id : p.first_scorer_id,
      no_goal_prediction: d.no_goal_prediction !== undefined ? d.no_goal_prediction : p.no_goal_prediction,
    };
  };

  const handlePredictionChange = async (matchId, field, value) => {
    let nextValue = value;
    if (field === 'home_score' || field === 'away_score') {
      nextValue = value === '' ? null : Number(value);
    }
    setDrafts(d => ({ ...d, [matchId]: { ...(d[matchId] || {}), [field]: nextValue } }));

    // Compose the full new state for this match
    const merged = { ...draftFor(matchId), [field]: nextValue };

    // For first_scorer changes, we need to encode "no_goal" too
    let payload = { [field]: nextValue };
    if (field === 'first_scorer_id') {
      payload = {
        first_scorer_id: nextValue === '__NO_GOAL__' ? null : nextValue || null,
        no_goal_prediction: nextValue === '__NO_GOAL__',
      };
    }

    // Upsert only if both scores are now present
    if (merged.home_score != null && merged.away_score != null) {
      const { error } = await upsertPrediction(matchId, payload);
      if (error) toast(`Save failed: ${error.message}`, 'error');
      else {
        // Clear the draft for this field since DB now has it
        setDrafts(d => {
          const next = { ...d };
          if (next[matchId]) {
            const { [field]: _, ...rest } = next[matchId];
            next[matchId] = rest;
          }
          return next;
        });
      }
    }
  };

  const handleBonusChange = async (field, value) => {
    const { error } = await upsertBonus({ [field]: value || null });
    if (error) toast(`Save failed: ${error.message}`, 'error');
  };

  const signOut = async () => { await supabase.auth.signOut(); };

  if (refLoading || matchesLoading) {
    return h('div', { className: 'loading-fullscreen' },
      h('div', { className: 'spinner' }),
      h('div', { className: 'loading-text' }, 'Loading tournament data…')
    );
  }

  return h(React.Fragment, null,
    h(Header, { profile, league, page, setPage, signOut }),
    h('main', null,
      h(MigrationBanner, {
        userId: user.id, matches, playersByTeam,
        onComplete: () => { refetchMatches(); }
      }),
      page === 'home' && h(HomePage, {
        bonus, teams, players: playerById, scoringConfig: league.scoring_config,
        onBonusChange: handleBonusChange, setPage, leagueCode: league.code, leagueName: league.name
      }),
      page === 'predict' && h(PredictPage, {
        matches, predictions, drafts, draftFor,
        teamByCode, playersByTeam, playerById,
        activeStage, setActiveStage,
        onChange: handlePredictionChange,
        leagueId: league.id, scoringConfig: league.scoring_config
      }),
      page === 'leaderboard' && h(LeaderboardPage, {
        leaderboard, currentUserId: user.id
      }),
      page === 'rules' && h(RulesPage, { scoringConfig: league.scoring_config }),
      page === 'admin' && h(AdminPage, {
        matches, teamByCode, playersByTeam, isOwner: league.role === 'owner',
        onResultEntered: refetchMatches
      })
    )
  );
}

function MatchCard({ match, draftValues, teamByCode, playersByTeam, playerById, onChange, leagueId, scoringConfig }) {
  const locked = isLocked(match);
  const home = teamByCode[match.home_team_code];
  const away = teamByCode[match.away_team_code];
  const teamsKnown = !!home && !!away;
  const hasActual = match.actual_home_score != null;
  const isKnockout = match.stage !== 'GROUP';
  const players = teamsKnown ? {
    home: playersByTeam[match.home_team_code] || [],
    away: playersByTeam[match.away_team_code] || [],
  } : { home: [], away: [] };

  // Compute earned points for THIS prediction (mirror of SQL match_points view)
  const earnedPoints = hasActual && draftValues.home_score != null
    ? calcPoints(draftValues, match, scoringConfig) : null;

  // Opponents' predictions (only fetched if match is locked)
  const opponentPreds = useOpponentPredictions(match.id, leagueId, locked);

  // First scorer dropdown value: convert no_goal flag back to sentinel
  const firstScorerSelectValue = draftValues.no_goal_prediction
    ? '__NO_GOAL__' : (draftValues.first_scorer_id || '');

  return h('div', { className: `match-card ${locked?'locked':''} ${hasActual?'scored':''}` },
    h('div', { className: 'match-meta' },
      h('span', { className: 'match-id' }, match.id),
      h('span', { className: 'match-stage-pill' }, match.stage === 'GROUP' ? `Group ${match.group}` : stageLabel(match.stage)),
      h('span', null, formatKickoff(match.kickoff_at))
    ),
    h('div', { className: 'match-teams' },
      h('div', { className: 'team team-home' },
        h(FlagImg, { iso: home?.iso, alt: home?.name }),
        h('span', { className: 'team-name' }, home?.name || 'TBD')),
      h('span', { className: 'vs' }, 'VS'),
      h('div', { className: 'team team-away' },
        h(FlagImg, { iso: away?.iso, alt: away?.name }),
        h('span', { className: 'team-name' }, away?.name || 'TBD'))
    ),
    h('div', { className: 'score-inputs' },
      h('input', { type: 'number', min: 0, max: 20, className: 'score-input',
        value: draftValues.home_score ?? '', disabled: locked || !teamsKnown,
        onChange: e => onChange('home_score', e.target.value), placeholder: '-' }),
      h('span', { className: 'score-dash' }, ':'),
      h('input', { type: 'number', min: 0, max: 20, className: 'score-input',
        value: draftValues.away_score ?? '', disabled: locked || !teamsKnown,
        onChange: e => onChange('away_score', e.target.value), placeholder: '-' })
    ),
    isKnockout && h('div', { className: 'first-scorer' },
      h('div', { className: 'first-scorer-label' },
        h('span', null, '⚡ 1st Goal Scorer'),
        h('span', { className: 'reward' }, `+${scoringConfig?.first_scorer || 5} PTS`)
      ),
      teamsKnown
        ? h('select', {
            value: firstScorerSelectValue, disabled: locked,
            onChange: e => onChange('first_scorer_id', e.target.value)
          },
            h('option', { value: '' }, '— Pick a player —'),
            h('option', { value: '__NO_GOAL__' }, '⚠ No goal / Own goal'),
            players.home.length > 0 && h('optgroup', { label: home.name },
              players.home.map(p => h('option', { key: p.id, value: p.id }, p.name))),
            players.away.length > 0 && h('optgroup', { label: away.name },
              players.away.map(p => h('option', { key: p.id, value: p.id }, p.name)))
          )
        : h('div', { style:{fontSize:'12px', color:'var(--text-dim)', padding:'8px'} },
            'Available once teams are confirmed by the group stage results.')
    ),
    h('div', { className: 'match-footer' },
      h('span', { className: `lock-status ${locked?'locked':''}` },
        locked ? '🔒 Locked' : '🟢 Open'),
      hasActual
        ? h('span', null,
            h('span', { className: 'actual-result' }, `Final ${match.actual_home_score}-${match.actual_away_score} `),
            h('span', { className: 'points-earned' }, `+${earnedPoints || 0} pts`))
        : h('span', { className: 'points-earned', style:{color:'var(--text-dim)'} },
            draftValues.home_score != null ? '⏳ Awaiting result' : '—')
    ),
    locked && opponentPreds.length > 1 && h('div', { className: 'opponents' },
      h('div', { className: 'opponents-label' }, '👥 League picks'),
      h('div', { className: 'opponents-list' },
        opponentPreds.map(op => h('div', { key: op.id, className: 'opponent-row' },
          h('span', null, op.profiles?.display_name || '?'),
          h('span', { className: 'score' },
            `${op.home_score}-${op.away_score}`,
            op.first_scorer_id ? ` · ${playerById[op.first_scorer_id]?.name || ''}` :
              op.no_goal_prediction ? ' · no goal' : '')
        ))
      )
    )
  );
}

// Client-side scoring mirror (matches SQL match_points view).
// Used for the per-match "+N pts" display. SQL is still the authority.
function calcPoints(pred, match, scoringConfig) {
  if (pred.home_score == null || match.actual_home_score == null) return 0;
  const cfg = scoringConfig?.[match.stage] || { result: 0, exact: 0 };
  let pts = 0;
  if (pred.home_score === match.actual_home_score && pred.away_score === match.actual_away_score) {
    pts = cfg.exact;
  } else if (Math.sign(pred.home_score - pred.away_score) === Math.sign(match.actual_home_score - match.actual_away_score)) {
    pts = cfg.result;
  }
  // Scorer
  if (match.stage !== 'GROUP') {
    if (match.actual_no_goal && pred.no_goal_prediction) pts += scoringConfig?.first_scorer || 0;
    else if (match.actual_first_scorer_id && pred.first_scorer_id === match.actual_first_scorer_id) pts += scoringConfig?.first_scorer || 0;
  }
  return pts;
}

// ============================================================================
// PAGE — Admin (calls enter_match_result RPC)
// ============================================================================
function AdminPage({ matches, teamByCode, playersByTeam, isOwner, onResultEntered }) {
  const toast = useToast();
  const [stage, setStage] = useState('GROUP');

  if (!isOwner) {
    return h('div', null,
      h('div', { className: 'page-header' },
        h('h1', { className: 'page-title' },
          'Scorer ', h('span', { className: 'gradient' }, 'Console.'))),
      h('div', { className: 'admin-note' },
        '🚫 You must be a league owner to enter match results. Ask the person who created the league.')
    );
  }

  const stageMatches = matches.filter(m => m.stage === stage);

  const enterResult = async (matchId, fields) => {
    const { error } = await supabase.rpc('enter_match_result', {
      p_match_id: matchId,
      p_home_score: fields.home_score,
      p_away_score: fields.away_score,
      p_first_scorer_id: fields.first_scorer_id || null,
      p_no_goal: !!fields.no_goal,
      p_override: !!fields.override
    });
    if (error) {
      if (error.message.includes('Result already entered')) {
        if (confirm('Result already entered. Override?')) {
          return enterResult(matchId, { ...fields, override: true });
        }
        return;
      }
      toast(`Failed: ${error.message}`, 'error');
      return;
    }
    toast(`Saved result for ${matchId}`, 'success');
    onResultEntered();
  };

  return h('div', null,
    h('div', { className: 'page-header' },
      h('h1', { className: 'page-title' },
        'Scorer ', h('span', { className: 'gradient' }, 'Console.')),
      h('p', { className: 'page-subtitle' },
        'Enter actual results as matches finish. Calls the enter_match_result RPC — RLS verifies you\'re a league owner.')
    ),
    h('div', { className: 'admin-note' },
      '☁️ Cloud mode: results are saved to Supabase and scored immediately via the SQL leaderboard view.'),
    h('div', { className: 'stage-tabs' },
      STAGES.map(s => h('button', {
        key: s.key, className: `stage-tab ${stage===s.key?'active':''}`,
        onClick: () => setStage(s.key)
      }, s.label))
    ),
    h('div', { className: 'matches-grid' },
      stageMatches.map(m => h(AdminMatchRow, {
        key: m.id, match: m, teamByCode, playersByTeam, onSubmit: (fields) => enterResult(m.id, fields)
      }))
    )
  );
}

function AdminMatchRow({ match, teamByCode, playersByTeam, onSubmit }) {
  const [home, setHome] = useState(match.actual_home_score ?? '');
  const [away, setAway] = useState(match.actual_away_score ?? '');
  const [firstScorerId, setFirstScorerId] = useState(match.actual_first_scorer_id || '');
  const [noGoal, setNoGoal] = useState(match.actual_no_goal || false);

  const homeTeam = teamByCode[match.home_team_code];
  const awayTeam = teamByCode[match.away_team_code];
  const teamsKnown = !!homeTeam && !!awayTeam;
  const isKnockout = match.stage !== 'GROUP';
  const players = teamsKnown ? [
    ...(playersByTeam[match.home_team_code] || []),
    ...(playersByTeam[match.away_team_code] || []),
  ] : [];

  const selectVal = noGoal ? '__NO_GOAL__' : firstScorerId;
  const onSelectChange = (v) => {
    if (v === '__NO_GOAL__') { setNoGoal(true); setFirstScorerId(''); }
    else { setNoGoal(false); setFirstScorerId(v); }
  };

  const save = () => {
    if (home === '' || away === '') { alert('Enter both scores'); return; }
    onSubmit({
      home_score: Number(home),
      away_score: Number(away),
      first_scorer_id: firstScorerId || null,
      no_goal: noGoal
    });
  };

  return h('div', { className: 'match-card' },
    h('div', { className: 'match-meta' },
      h('span', { className: 'match-id' }, match.id),
      h('span', null, formatKickoff(match.kickoff_at))
    ),
    h('div', { className: 'match-teams' },
      h('div', { className: 'team team-home' },
        h(FlagImg, { iso: homeTeam?.iso, alt: homeTeam?.name }),
        h('span', { className: 'team-name' }, homeTeam?.name || 'TBD')),
      h('span', { className: 'vs' }, 'VS'),
      h('div', { className: 'team team-away' },
        h(FlagImg, { iso: awayTeam?.iso, alt: awayTeam?.name }),
        h('span', { className: 'team-name' }, awayTeam?.name || 'TBD'))
    ),
    h('div', { className: 'score-inputs' },
      h('input', { type: 'number', min: 0, max: 30, className: 'score-input',
        value: home, onChange: e => setHome(e.target.value), placeholder: '?' }),
      h('span', { className: 'score-dash' }, ':'),
      h('input', { type: 'number', min: 0, max: 30, className: 'score-input',
        value: away, onChange: e => setAway(e.target.value), placeholder: '?' })
    ),
    isKnockout && teamsKnown && h('div', { className: 'first-scorer' },
      h('div', { className: 'first-scorer-label' },
        h('span', null, '⚡ Actual 1st Scorer'),
        h('span', { className: 'reward' }, 'awards +pts to pickers')),
      h('select', { value: selectVal, onChange: e => onSelectChange(e.target.value) },
        h('option', { value: '' }, '— Not entered —'),
        h('option', { value: '__NO_GOAL__' }, '⚠ No goal / Own goal'),
        homeTeam && h('optgroup', { label: homeTeam.name },
          (playersByTeam[match.home_team_code] || []).map(p => h('option', { key: p.id, value: p.id }, p.name))),
        awayTeam && h('optgroup', { label: awayTeam.name },
          (playersByTeam[match.away_team_code] || []).map(p => h('option', { key: p.id, value: p.id }, p.name)))
      )
    ),
    h('button', { className: 'btn', onClick: save, style: { width: '100%', marginTop: '8px' } },
      match.actual_home_score != null ? 'Update result' : 'Save result')
  );
}

// ============================================================================
// ROOT — handles auth + league gating
// ============================================================================
function Root() {
  if (!configValid) return h(ConfigMissingScreen);

  const { user, profile, loading: authLoading } = useAuth();
  const { league, loading: leagueLoading, refetch: refetchLeague } =
    useLeagueMembership(user?.id);

  if (authLoading) {
    return h('div', { className: 'loading-fullscreen' },
      h('div', { className: 'spinner' }),
      h('div', { className: 'loading-text' }, 'Connecting…')
    );
  }

  if (!user) return h(AuthScreen);

  if (leagueLoading) {
    return h('div', { className: 'loading-fullscreen' },
      h('div', { className: 'spinner' }),
      h('div', { className: 'loading-text' }, 'Loading your league…')
    );
  }

  if (!league) return h(JoinLeagueScreen, {
    onJoined: refetchLeague,
    userId: user.id,
    displayName: profile?.display_name
  });

  return h(MainApp, { user, profile, league, onLeftLeague: refetchLeague });
}

createRoot(document.getElementById('root')).render(
  h(ToastProvider, null, h(Root))
);
</script>
